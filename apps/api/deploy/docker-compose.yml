# Proyecto independiente "syspaq-api" — no mezclar con redroid u otros stacks.
# En Hostinger Docker Manager: Compose → nuevo proyecto → apuntar a esta carpeta.
#
# Desde la raíz del monorepo (syspaq/):
#   docker compose -f apps/api/deploy/docker-compose.yml --env-file apps/api/deploy/.env.release up -d --build
#
# O en el VPS, con el repo clonado en /opt/syspaq:
#   cd /opt/syspaq && docker compose -f apps/api/deploy/docker-compose.yml --env-file apps/api/deploy/.env.release up -d --build

name: syspaq-api

services:
  api:
    build:
      context: ../../..
      dockerfile: apps/api/deploy/Dockerfile
    env_file:
      - .env.release
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      # Solo localhost del VPS: el proxy global (Nginx/Traefik) hace el enrutado HTTPS
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blumbox_net
      - redroid_default   # Para que nginx de redroid haga proxy a api.syspaq.com
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blumbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: blumbox_api
    volumes:
      - blumbox_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blumbox -d blumbox_api"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blumbox_net
    restart: unless-stopped

networks:
  blumbox_net:
    name: blumbox_api_isolated
  redroid_default:
    external: true

volumes:
  blumbox_pgdata:
    name: blumbox_api_pgdata
