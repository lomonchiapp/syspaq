# Nginx en el HOST (no dentro del contenedor de la API).
# Proxy a la API que escucha en 127.0.0.1:3001
#
# Incluir en sites-enabled y: certbot --nginx -d api.syspaq.com

server {
    listen 443 ssl http2;
    server_name api.syspaq.com;

    # ssl_certificate /etc/letsencrypt/live/api.syspaq.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.syspaq.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
